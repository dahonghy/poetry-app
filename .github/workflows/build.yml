name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build APK
        run: buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 1
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: poetry-app
          path: bin/*.apk
